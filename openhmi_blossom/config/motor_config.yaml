# Blossom Motor Configuration
# IDs match the original pypot/Blossom convention:
#   1, 2, 3 = tower (head-tilt) motors
#   4       = base rotation (lazy susan)
#   5       = ears (optional)

motor_ids:
  lazy_susan:       1   # Base rotation
  motor_front:      2   # Front head-tilt string
  motor_back_left:  3   # Back-left head-tilt string
  motor_back_right: 4   # Back-right head-tilt string
  # ears:           5   # Uncomment if ears motor is present

# Position limits in raw XL-320 units (0–1023, full range = 300°)
# Tower motors pull strings: 0 = slack (extended), higher = more pull
# Lazy susan: 0–1023 covers full 300° rotation, 512 = centre
motor_limits:
  motor_front:      [0, 950]
  motor_back_left:  [0, 950]
  motor_back_right: [0, 950]
  lazy_susan:       [0, 1023]
  # ears:           [170, 443]   # [50°, 130°] mapped to raw units

# Neutral/home positions — upright head position based on animation data (~870 raw)
home_positions:
  motor_front:      870
  motor_back_left:  870
  motor_back_right: 870
  lazy_susan:       512

# Default moving speeds (used at init; overridden per-command during playback)
motor_speeds:
  motor_front:      200
  motor_back_left:  200
  motor_back_right: 200
  lazy_susan:       200
